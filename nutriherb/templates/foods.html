{% extends 'base.html' %}
{% block title %}Superfood Library | NutriHerb{% endblock %}
{% block content %}
  <section class="reveal" style="text-align: center; margin-bottom: 6rem; padding-top: 4rem;">
    <div class="badge" style="display:inline-block; padding: 0.5rem 1rem; background: var(--primary-glow); color: var(--primary-dark); border-radius: 99px; font-weight: 800; font-size: 0.8rem; margin-bottom: 2rem; text-transform: uppercase;">
      The Library
    </div>
    <h1 style="font-size: 4rem; margin-bottom: 1.5rem;">Ingredient Database</h1>
    <p style="max-width: 600px; margin: 0 auto 4rem; color: var(--fg-muted);">Explore the chemical and biological profiles of nature's most powerful functional ingredients.</p>
    
    <div style="max-width: 600px; margin: 0 auto; position: relative;">
      <input id="food-search" type="search" placeholder="Search by name or nutrient (e.g. Curcumin, Iron)..." style="padding: 1.5rem 2rem; border-radius: 99px; box-shadow: 0 10px 40px rgba(0,0,0,0.03);"/>
    </div>
    
    <div class="chips" style="display:flex; justify-content:center; gap:0.75rem; margin-top:3rem; flex-wrap:wrap;">
      <span class="chip active" data-cat="all">All Items</span>
      <span class="chip" data-cat="herb">🌿 Herbs</span>
      <span class="chip" data-cat="food">🍎 Foods</span>
      <span class="chip" data-cat="spice">🌶️ Spices</span>
    </div>
  </section>

  <div id="foods-grid" class="bento" style="grid-template-rows: auto; margin-bottom: 6rem;">
    <!-- Injected by JS -->
  </div>

  <script>
    fetch('/api/herbsfoods/')
      .then(r => r.json())
      .then(items => {
        const root = document.getElementById('foods-grid');
        const search = document.getElementById('food-search');
        const chips = document.querySelectorAll('.chip');
        let currentCat = 'all';

        function render() {
          const q = search.value.toLowerCase();
          const filtered = items.filter(i => {
            const matchesQ = !q || `${i.name} ${i.nutrients}`.toLowerCase().includes(q);
            const matchesCat = currentCat === 'all' || i.category === currentCat;
            return matchesQ && matchesCat;
          });
          
          root.innerHTML = filtered.map((i, idx) => `
            <div class="card reveal" style="animation-delay: ${idx * 0.05}s; height: 100%; display: flex; flex-direction: column;">
              <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem;">
                <div style="font-size: 2.5rem;">${i.category === 'herb' ? '🌿' : i.category === 'spice' ? '🌶️' : '🍎'}</div>
                <div style="font-size: 0.75rem; font-weight: 800; color: var(--primary); text-transform: uppercase; background: var(--primary-glow); padding: 0.4rem 0.8rem; border-radius: 99px;">${i.category}</div>
              </div>
              <h3 style="margin-bottom: 1rem; font-size: 1.6rem;">${i.name}</h3>
              <p style="font-size: 0.95rem; margin-bottom: 2rem; flex: 1;">${i.benefits.substring(0, 100)}...</p>
              <div style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
                <div style="font-size: 0.7rem; font-weight: 800; color: var(--fg-light); text-transform: uppercase; margin-bottom: 0.75rem;">Key Nutrients</div>
                <div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">
                  ${i.nutrients.split(',').map(n => `<span style="font-size: 0.8rem; background: #fff; padding: 0.3rem 0.7rem; border-radius: 99px; border: 1px solid var(--glass-border); font-weight: 600;">${n.trim()}</span>`).join('')}
                </div>
              </div>
            </div>
          `).join('') || `
            <div class="card" style="grid-column: 1/-1; text-align: center; padding: 6rem;">
              <div style="font-size: 4rem; margin-bottom: 2rem;">🔍</div>
              <h3>No ingredients found</h3>
              <p>Try a different search term or category.</p>
            </div>
          `;
        }

        search.addEventListener('input', render);
        chips.forEach(c => c.addEventListener('click', () => {
          chips.forEach(x => x.classList.remove('active'));
          c.classList.add('active');
          currentCat = c.getAttribute('data-cat');
          render();
        }));
        render();
      });
  </script>
{% endblock %}
