<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}NutriHerb{% endblock %}</title>
  <link rel="icon" href="/static/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
  <script defer src="/static/js/app.js"></script>
</head>
<body>
  {% if messages %}
    <div style="position: fixed; top: 100px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px;">
      {% for message in messages %}
        <div class="card animate" style="padding: 12px 24px; background: rgba(255,255,255,0.9); border-left: 4px solid var(--accent); white-space: nowrap;">
          {{ message }}
        </div>
      {% endfor %}
    </div>
    <script>
      setTimeout(() => {
        document.querySelectorAll('.animate').forEach(el => {
          if (el.parentElement.style.position === 'fixed') el.style.opacity = '0';
        });
      }, 3000);
    </script>
  {% endif %}

  <header>
    <h1>NutriHerb</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/foods/">Foods</a>
      <a href="/recipes/">Recipes</a>
      <a href="/health/">Health</a>
      <div style="width: 1px; height: 20px; background: rgba(0,0,0,0.1); margin: 0 8px;"></div>
      {% if user.is_authenticated %}
        <a href="/profile/" style="background: rgba(16,185,129,0.1); color: var(--accent);">{{ user.username }}</a>
        <a href="/logout/">Logout</a>
      {% else %}
        <a href="/login/">Login</a>
        <a href="/signup/" class="btn" style="padding: 8px 20px; font-size: 14px;">Join Free</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="container">
      <small>© 2026 NutriHerb • Nourishment for life.</small>
    </div>
  </footer>
</body>
</html>
