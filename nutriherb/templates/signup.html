{% extends 'base.html' %}
{% block title %}Sign Up - NutriHerb{% endblock %}
{% block content %}
<div class="hero-banner animate" style="padding: 64px 40px; text-align: center; grid-template-columns: 1fr; max-width: 500px; margin: 0 auto;">
    <h2 class="hero-title">Join NutriHerb</h2>
    <p class="hero-sub" style="margin-top:16px;">Start your journey to holistic wellness today.</p>
    
    <form method="post" style="margin-top: 32px; display: flex; flex-direction: column; gap: 16px;">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Choose a Username" required style="padding: 16px 24px;">
        <input type="email" name="email" placeholder="Email Address" required style="padding: 16px 24px;">
        <input type="password" name="password" placeholder="Create a Password" required style="padding: 16px 24px;">
        <button type="submit" class="btn" style="width: 100%;">Create Account</button>
    </form>
    <p class="muted" style="margin-top: 24px;">Already have an account? <a href="/login/" style="color: var(--accent); text-decoration: none; font-weight: 600;">Login here</a></p>
</div>
{% endblock %}
